name: Build Feature Branch

on:
  push:
    branches-ignore: [main]
  pull_request:

env:
  PLUGIN_NAME: RagdollSystem
  SOLUTION_DIR: RagdollSystem

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Dalamud
        run: |
          mkdir -p $HOME/dalamud
          wget -q https://goatcorp.github.io/dalamud-distrib/latest.zip -O /tmp/dalamud.zip
          unzip -o /tmp/dalamud.zip -d $HOME/dalamud

      - name: Build
        run: dotnet build ${{ env.SOLUTION_DIR }}/${{ env.PLUGIN_NAME }}.csproj -c Release
        env:
          DALAMUD_HOME: /home/runner/dalamud

      - name: Package
        run: |
          out_dir=$(find ${{ env.SOLUTION_DIR }}/bin/Release -name "${{ env.PLUGIN_NAME }}.dll" -printf '%h' -quit)
          echo "Output dir: $out_dir"
          mkdir -p artifact/${{ env.PLUGIN_NAME }}
          cp "$out_dir"/${{ env.PLUGIN_NAME }}.dll artifact/${{ env.PLUGIN_NAME }}/
          cp "$out_dir"/${{ env.PLUGIN_NAME }}.json artifact/${{ env.PLUGIN_NAME }}/
          [ -f "$out_dir"/${{ env.PLUGIN_NAME }}.pdb ] && cp "$out_dir"/${{ env.PLUGIN_NAME }}.pdb artifact/${{ env.PLUGIN_NAME }}/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest
          path: artifact/
